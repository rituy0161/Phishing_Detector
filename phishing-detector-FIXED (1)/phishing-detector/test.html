<!DOCTYPE html>
<html>
<head>
    <title>Test - Phishing Detector Extension</title>
    <style>
        body { font-family: system-ui; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .ok { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        h1 { color: #333; }
        .info { background: #e7f3ff; padding: 10px; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🔍 Extension Test Page</h1>
    
    <div class="info">
        <strong>What this page does:</strong>
        <ul>
            <li>Tests if content script loads</li>
            <li>Tests if background script responds</li>
            <li>Shows any errors in the extension</li>
        </ul>
    </div>
    
    <div id="status"></div>
    
    <h2>URLs on this page (for testing):</h2>
    <ul>
        <li><a href="https://google.com">Google</a> - legitimate</li>
        <li><a href="http://suspicious.tk/verify">Suspicious</a> - should flag</li>
        <li><a href="http://192.168.1.1/admin">IP Address</a> - should flag</li>
    </ul>
    
    <script>
        const statusDiv = document.getElementById('status');
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'status ' + (type === 'error' ? 'error' : 'ok');
            div.textContent = msg;
            statusDiv.appendChild(div);
            console.log(`[TEST] ${msg}`);
        }
        
        // Test 1: Check if content script can access this document
        try {
            const links = document.querySelectorAll('a');
            log(`✓ Can access ${links.length} links in DOM`, 'ok');
        } catch (e) {
            log(`✗ Cannot access DOM: ${e.message}`, 'error');
        }
        
        // Test 2: Check if chrome API is available
        if (typeof chrome !== 'undefined' && chrome.runtime) {
            log('✓ Chrome API is available', 'ok');
            
            // Test 3: Try to send message to background script
            chrome.runtime.sendMessage({type: 'TEST'}, (response) => {
                if (response) {
                    log('✓ Background script responded to test message', 'ok');
                } else {
                    log('✗ Background script did not respond', 'error');
                }
            }).catch((error) => {
                log(`✗ Could not reach background script: ${error}`, 'error');
            });
        } else {
            log('✗ Chrome API not available (extension may not be loaded)', 'error');
        }
        
        // Test 4: Check if extension can find this page
        window.addEventListener('load', () => {
            setTimeout(() => {
                // After content script should have run
                log('✓ Page fully loaded (content script should have scanned)', 'ok');
                
                // Try to get scan result
                chrome.runtime.sendMessage({type: 'GET_SCAN_RESULT'}, (response) => {
                    if (response && response.pageURL) {
                        log(`✓ Got scan result for: ${response.pageURL}`, 'ok');
                        log(`  Risk score: ${Math.round(response.riskScore * 100)}%`, 'ok');
                        log(`  Suspicious URLs: ${response.suspicious.length}`, 'ok');
                    } else if (response && response.error) {
                        log(`⚠ API not available (expected if Flask server not running)`, 'ok');
                    } else {
                        log(`⚠ No scan result yet`, 'ok');
                    }
                });
            }, 1000);
        });
    </script>
</body>
</html>
